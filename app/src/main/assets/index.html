<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayesha AI Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 🚀 کال مائیک کی اینیمیشن 🚀 */
        .cg-wave { width: 4px; background-color: #ef4444; border-radius: 4px; animation: cgwave 1s ease-in-out infinite; margin: 0 1.5px; }
        @keyframes cgwave { 0%, 100% { height: 6px; } 50% { height: 16px; } }

        /* 🚀 بٹن چھپانے اور دکھانے کی اینیمیشن 🚀 */
        .btn-collapse { width: 0 !important; padding: 0 !important; border-width: 0 !important; opacity: 0 !important; overflow: hidden !important; margin: 0 !important; pointer-events: none; }
        .btn-expand { width: 56px !important; opacity: 1 !important; pointer-events: auto; }
        .transition-layout { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* 🚀 عائشہ کی پلین چیٹ اور ٹائپنگ کرسر (ChatGPT Style) 🚀 */
        .ai-text-container { font-size: 1.1rem; line-height: 1.8; text-align: right; font-family: sans-serif; direction: rtl; color: #e5e7eb; }
        .typing-cursor::after {
            content: '●';
            color: #e5e7eb;
            margin-right: 4px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 🚀 سکرول بار کو چھپانا لیکن سکرولنگ جاری رکھنا 🚀 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="h-screen flex bg-black text-white font-sans w-full overflow-hidden relative">
    
    <div id="top-toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-[#2f3037] text-gray-200 px-6 py-2.5 rounded-full text-sm font-medium z-50 transition-all duration-300 opacity-0 -translate-y-10 pointer-events-none flex items-center shadow-lg border border-[#3a8ff7]/30">
        <span id="toast-text">Notification</span>
    </div>

    <div class="flex-1 flex flex-col h-full w-full">
        <header class="flex items-center justify-between p-4 border-b border-[#2f3037] bg-black z-30">
            <button class="p-2 text-gray-400 hover:text-white transition cursor-pointer">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 class="text-lg font-bold text-gray-200 tracking-wide">Ayesha AI</h1>
            <div class="w-10"></div> 
        </header>

        <main class="flex-1 flex flex-col relative overflow-hidden bg-black">
            <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 relative z-10 pb-36" id="chat-box">
                <div class="flex flex-col items-end mb-8 w-full pr-2">
                    <div class="ai-text-container">السلام علیکم رضا! میں عائشہ ہوں۔ بتائیے میں آج آپ کی کیا مدد کر سکتی ہوں؟</div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 h-40 bg-gradient-to-t from-black via-black/95 to-transparent pointer-events-none z-20"></div>

            <div class="px-4 md:px-6 pb-6 bg-transparent z-30 w-full max-w-4xl mx-auto absolute bottom-0 left-0 right-0">
                
                <div id="normal-mode-bar" class="flex items-center justify-between w-full h-14 transition-layout">
                    <button class="btn-collapse transition-layout h-14 rounded-full bg-[#16243d] border border-[#2f3037] flex items-center justify-center text-gray-400 mr-2 flex-shrink-0 cursor-pointer">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <div class="flex-1 h-14 bg-[#212121] border border-[#2f3037] rounded-full flex items-center transition-layout overflow-hidden shadow-lg relative">
                        <button class="w-14 transition-layout h-full flex items-center justify-center text-gray-400 flex-shrink-0 cursor-pointer">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                        
                        <input type="text" id="user-input" class="flex-1 h-full bg-transparent px-3 text-white outline-none transition-layout text-right text-[1.05rem]" placeholder="...میسج ٹائپ کریں" autocomplete="off" dir="rtl">
                        
                        <button id="in-send" class="btn-collapse transition-layout h-full flex items-center justify-center text-white bg-white/10 rounded-full my-1 mx-1 flex-shrink-0 cursor-pointer pr-4 pl-3">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                        </button>
                        
                        <button id="in-mic" class="w-14 transition-layout h-full flex items-center justify-center text-gray-400 hover:text-white flex-shrink-0 cursor-pointer" onclick="if(window.AndroidBridge) AndroidBridge.toggleInlineMic()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                        </button>
                        
                        <button id="in-call" class="w-14 transition-layout h-full flex items-center justify-center text-gray-400 hover:text-white flex-shrink-0 cursor-pointer border-l border-[#2f3037]">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 7v10"></path><path d="M7 10v4"></path><path d="M22 10v4"></path><path d="M2 11v2"></path></svg>
                        </button>
                    </div>
                </div>

                <div id="call-mode-bar" class="hidden items-center justify-center w-full h-14 gap-4 transition-layout">
                    <div class="flex-1 h-14 bg-[#212121] border border-[#2f3037] rounded-full flex items-center px-5 relative shadow-lg">
                        <span class="text-gray-400 text-sm animate-pulse flex-1 text-center">عائشہ آپ کو سن رہی ہے...</span>
                    </div>
                    
                    <button id="cg-end" class="h-14 bg-red-500/20 border border-red-500 text-red-500 font-bold text-sm px-6 rounded-full flex items-center gap-3 flex-shrink-0 shadow-lg hover:bg-red-500/30 transition-all cursor-pointer">
                        <div class="flex items-center h-4">
                            <div class="cg-wave" style="animation-delay: 0s;"></div>
                            <div class="cg-wave" style="animation-delay: 0.2s;"></div>
                            <div class="cg-wave" style="animation-delay: 0.4s;"></div>
                        </div>
                        End Call
                    </button>
                </div>

            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
