<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayesha AI Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* لائیو کال ویوز (Waveform) کی اینیمیشن */
        .wave-bar {
            width: 3px; height: 12px; background-color: #3a8ff7; border-radius: 4px;
            animation: wave 1s ease-in-out infinite; margin: 0 1px;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; }
        .wave-bar:nth-child(3) { animation-delay: 0.4s; }
        .wave-bar:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { height: 8px; } 50% { height: 20px; } }
        
        /* چیٹ جی پی ٹی سٹائل سموتھ اینیمیشن (Pop-out) */
        .pop-out-btn {
            position: absolute; width: 56px; height: 56px; border-radius: 50%;
            background-color: #16243d; border: 1px solid #2f3037;
            display: flex; items-center justify-center; color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: scale(0.5); pointer-events: none; z-index: 40;
        }
        .pop-out-btn.active { opacity: 1; transform: scale(1); pointer-events: auto; }
    </style>
</head>
<body class="h-screen flex bg-black text-white font-sans w-full overflow-hidden relative">
    
    <div id="top-toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-[#2f3037] text-gray-200 px-6 py-2.5 rounded-full text-sm font-medium z-50 transition-all duration-300 opacity-0 -translate-y-10 pointer-events-none flex items-center gap-3 shadow-lg border border-[#3a8ff7]/30">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3a8ff7" stroke-width="2"><path d="M12 2v20"></path><path d="M17 7v10"></path><path d="M7 10v4"></path><path d="M22 10v4"></path><path d="M2 11v2"></path></svg>
        <span id="toast-text">Voice chat ended</span>
    </div>

    <input type="file" id="hidden-file-input" class="hidden" accept="image/*">
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden transition-opacity cursor-pointer"></div>

    <aside id="sidebar" class="fixed z-50 w-64 h-full border-r border-[#2f3037] flex flex-col bg-[#0a0a0a] transform -translate-x-full transition-transform duration-300 ease-in-out left-0 top-0 shadow-2xl">
        <div class="p-4 flex-1 flex flex-col overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6 mt-4 text-center text-[#3a8ff7]">Select Assistant</h2>
            <div class="space-y-4" id="assistants-list">
                <button class="assistant-btn w-full text-left p-3 bg-[#16243d] border border-[#3a8ff7] rounded-xl flex items-center gap-3 transition" data-name="Ayesha AI">
                    <span class="w-3 h-3 rounded-full bg-green-500"></span> 
                    <span class="font-semibold">Ayesha AI</span>
                </button>
            </div>
        </div>
        <div class="p-4 border-t border-[#2f3037] bg-[#0a0a0a]">
            <button class="w-full mb-4 py-2.5 bg-gradient-to-r from-[#3a8ff7] to-purple-600 rounded-xl font-bold text-white transition-transform active:scale-95 flex items-center justify-center gap-2">Upgrade Premium</button>
            <div class="flex items-center gap-3 mt-4">
                <div class="w-8 h-8 rounded-full bg-[#3a8ff7] flex items-center justify-center font-bold text-white shadow-md">R</div>
                <span class="font-medium text-sm text-gray-300">Ali Raza</span>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full w-full">
        <header class="flex items-center justify-between p-4 border-b border-[#2f3037] bg-[#0a0a0a] z-30">
            <button id="menu-btn" class="p-2 text-[#3a8ff7] hover:bg-[#2f3037] rounded-lg transition">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 class="text-lg font-bold text-white tracking-wide">Ayesha AI</h1>
            <div class="w-10"></div> 
        </header>

        <main class="flex-1 flex flex-col relative overflow-hidden bg-black">
            <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6" id="chat-box">
                <div id="image-preview-container" class="hidden fixed bottom-24 left-1/2 transform -translate-x-1/2 w-full max-w-4xl px-4 z-40">
                    <div class="bg-[#16243d] p-2 pr-4 rounded-xl border border-[#3a8ff7] shadow-lg flex items-center justify-between w-fit gap-4 mx-auto">
                        <div class="flex items-center gap-3">
                            <img id="preview-img" src="" class="h-10 w-10 object-cover rounded-md border border-[#3a8ff7]/50">
                            <span class="text-sm text-[#e0e0e0] font-medium">تصویر منسلک ہے</span>
                        </div>
                        <button id="remove-img-btn" class="bg-[#3a8ff7]/20 text-[#3a8ff7] hover:bg-[#3a8ff7] hover:text-white rounded-full p-1.5 transition-colors">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>

                <div id="thinking-indicator" class="hidden w-full mt-2 mb-4 flex justify-start px-2">
                    <div class="flex items-center gap-2 text-[#3a8ff7]">
                        <svg class="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span id="indicator-text" class="animate-pulse text-sm font-medium">سوچ رہی ہے...</span>
                    </div>
                </div>
            </div>

            <div class="relative w-full px-4 md:px-6 pb-6 bg-black flex flex-col z-30">
                <div id="input-area" class="relative w-full flex items-center justify-center max-w-4xl mx-auto h-16 transition-all duration-300">
                    
                    <div id="input-pill" class="relative flex-1 h-14 bg-[#16243d] border border-[#2f3037] gemini-glow rounded-full flex items-center transition-all duration-300 ml-0 overflow-hidden pr-1 pl-1 w-full">
                        
                        <button id="plus-btn" class="w-12 h-12 flex-shrink-0 flex items-center justify-center text-[#3a8ff7] rounded-full transition-all duration-300">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>

                        <input type="text" id="user-input" class="flex-1 bg-transparent px-2 py-3 outline-none text-white text-base placeholder-gray-400 w-full" placeholder="Ask something..." autocomplete="off">
                        
                        <div class="flex items-center gap-1 flex-shrink-0">
                            <button id="start-call-btn" class="p-3 text-[#3a8ff7] hover:text-white transition-all duration-200" title="Start Live Call">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"></path><path d="M17 7v10"></path><path d="M7 10v4"></path><path d="M22 10v4"></path><path d="M2 11v2"></path></svg>
                            </button>
                            
                            <button id="send-action-btn" class="hidden p-3 text-[#3a8ff7] transition-colors hover:text-white">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                            </button>

                            <button id="mic-action-btn" class="p-3 text-[#3a8ff7] transition-colors hover:text-white rounded-full transition-all duration-200">
                                <svg id="mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                                <svg id="stop-icon" class="hidden text-white animate-pulse" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <button id="call-plus-btn" class="pop-out-btn shadow-xl flexitems-center justify-center flex-shrink-0">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <button id="mute-call-btn" class="pop-out-btn shadow-xl flex items-center justify-center flex-shrink-0">
                        <svg id="unmuted-icon-call" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                        <svg id="muted-icon-call" class="hidden text-red-500" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path></svg>
                    </button>
                    
                    <div id="call-end-pill" class="absolute h-14 bg-[#16243d] border border-[#2f3037] shadow-xl rounded-full flex items-center justify-between px-2 pl-4 transition-all duration-400 opacity-0 transform scale-50 pointer-events-none z-50">
                        <div class="flex items-center gap-3">
                            <div class="flex items-center h-6 justify-center">
                                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                            </div>
                            <span class="text-[#3a8ff7] font-medium text-sm ml-2">Connecting...</span>
                        </div>
                        <button id="end-call-btn" class="px-5 py-2.5 rounded-full bg-[#3a8ff7] text-white font-semibold text-sm transition active:scale-95 shadow-md flex-shrink-0">
                            <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-white animate-pulse"></div> End</div>
                        </button>
                    </div>

                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
