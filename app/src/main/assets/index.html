<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayesha AI Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .wave-bar { width: 3px; height: 12px; background-color: #3a8ff7; border-radius: 4px; animation: wave 1.2s ease-in-out infinite; margin: 0 1.5px; }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; } .wave-bar:nth-child(3) { animation-delay: 0.4s; } .wave-bar:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { height: 8px; } 50% { height: 22px; } }
        
        /* تھیم کے مطابق نیلے رنگ کی لہریں */
        .cg-wave { width: 4px; background-color: #3a8ff7; border-radius: 4px; animation: cgwave 1s ease-in-out infinite; margin: 0 1.5px; }
        @keyframes cgwave { 0%, 100% { height: 6px; } 50% { height: 16px; } }

        /* بٹنز کو غائب/ظاہر کرنے کی کلاسز */
        .btn-collapse { width: 0 !important; padding: 0 !important; border-width: 0 !important; opacity: 0 !important; overflow: hidden !important; margin: 0 !important; pointer-events: none; }
        .btn-expand { width: 56px !important; opacity: 1 !important; pointer-events: auto; }
        
        .transition-layout { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* 🚀 پریمیم تھیم گلو 🚀 */
        .gemini-glow { 
            box-shadow: 0 0 12px rgba(58, 143, 247, 0.25); 
            border-color: rgba(58, 143, 247, 0.5) !important; 
        }
    </style>
</head>
<body class="h-screen flex bg-black text-white font-sans w-full overflow-hidden relative">
    
    <div id="top-toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-[#2f3037] text-gray-200 px-6 py-2.5 rounded-full text-sm font-medium z-50 transition-all duration-300 opacity-0 -translate-y-10 pointer-events-none flex items-center gap-3 shadow-lg border border-[#3a8ff7]/30">
        <span id="toast-text">Notification</span>
    </div>

    <input type="file" id="hidden-file-input" class="absolute w-0 h-0 opacity-0" accept="image/*" style="pointer-events: none;">
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden transition-opacity cursor-pointer"></div>

    <aside id="sidebar" class="fixed z-50 w-64 h-full border-r border-[#2f3037] flex flex-col bg-[#0a0a0a] transform -translate-x-full transition-transform duration-300 ease-in-out left-0 top-0 shadow-2xl">
        <div class="p-4 flex-1 flex flex-col overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6 mt-4 text-center text-[#3a8ff7]">Select Assistant</h2>
            <div class="space-y-4">
                <button class="assistant-btn w-full text-left p-3 bg-[#16243d] border border-[#3a8ff7] rounded-xl flex items-center gap-3 transition">
                    <span class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></span> 
                    <span class="font-semibold">Ayesha AI</span>
                </button>
            </div>
        </div>
        <div class="p-4 border-t border-[#2f3037] bg-[#0a0a0a]">
            <button class="w-full mb-4 py-2.5 bg-gradient-to-r from-[#3a8ff7] to-purple-600 rounded-xl font-bold text-white transition-transform active:scale-95 flex items-center justify-center gap-2">Upgrade Premium</button>
            <div class="flex items-center gap-3 mt-2">
                <div class="w-8 h-8 rounded-full bg-[#3a8ff7] flex items-center justify-center font-bold text-white shadow-md">R</div>
                <span class="font-medium text-sm text-gray-200">Ali Raza</span>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full w-full">
        <header class="flex items-center justify-between p-4 border-b border-[#2f3037] bg-[#0a0a0a] z-30">
            <button id="menu-btn" class="p-2 text-[#3a8ff7] hover:bg-[#2f3037] rounded-lg transition z-50 cursor-pointer">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 class="text-lg font-bold text-white tracking-wide">Ayesha AI</h1>
            <div class="w-10"></div> 
        </header>

        <main class="flex-1 flex flex-col relative overflow-hidden bg-black">
            <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 relative" id="chat-box">
                <div id="image-preview-container" class="hidden absolute bottom-4 left-4 md:left-6 z-40">
                    <div class="relative inline-block">
                        <img id="preview-img" src="" class="h-16 w-16 object-cover rounded-xl border-2 border-[#3a8ff7] shadow-lg">
                        <button id="remove-img-btn" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md hover:bg-red-600 transition-colors z-50 cursor-pointer">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
                <div id="thinking-indicator" class="hidden w-full flex justify-start px-2 pb-6"><span class="text-[#3a8ff7] animate-pulse font-medium">سوچ رہی ہے...</span></div>
            </div>

            <div class="px-4 md:px-6 pb-6 bg-black z-30 w-full max-w-4xl mx-auto">
                
                <div id="normal-mode-bar" class="flex items-center justify-between w-full h-14 transition-layout">
                    
                    <button id="out-plus" class="btn-collapse transition-layout h-14 rounded-full bg-[#16243d] border border-[#2f3037] flex items-center justify-center text-[#3a8ff7] shadow-lg mr-2 flex-shrink-0 cursor-pointer hover:bg-[#2f3037] hover:border-[#3a8ff7]">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>

                    <div id="main-pill" class="flex-1 h-14 bg-[#16243d] border border-[#2f3037] rounded-full flex items-center transition-layout overflow-hidden shadow-lg relative gemini-glow">
                        
                        <button id="in-plus" class="w-14 transition-layout h-full flex items-center justify-center text-[#3a8ff7] flex-shrink-0 cursor-pointer hover:text-white">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>

                        <input type="text" id="user-input" class="flex-1 h-full bg-transparent px-3 text-white outline-none transition-layout min-w-[50px]" placeholder="Ask something..." autocomplete="off">
                        
                        <button id="in-send" class="btn-collapse transition-layout h-full flex items-center justify-center text-[#3a8ff7] flex-shrink-0 cursor-pointer hover:text-white pr-5 pl-2">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                        </button>

                        <button id="in-mic" class="w-14 transition-layout h-full flex items-center justify-center text-[#3a8ff7] flex-shrink-0 relative cursor-pointer hover:text-white">
                            <svg id="icon-mic-normal" class="absolute transition-all" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                            <svg id="icon-mic-stop" class="hidden absolute text-white" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="3"/></svg>
                        </button>

                        <button id="in-call" class="w-14 transition-layout h-full flex items-center justify-center text-[#3a8ff7] flex-shrink-0 cursor-pointer hover:text-white">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 7v10"></path><path d="M7 10v4"></path><path d="M22 10v4"></path><path d="M2 11v2"></path></svg>
                        </button>
                    </div>
                </div>

                <div id="call-mode-bar" class="hidden items-center justify-between w-full h-14 gap-2 transition-layout">
                    
                    <button id="cg-plus" class="w-12 h-12 rounded-full bg-[#16243d] border border-[#2f3037] text-[#3a8ff7] flex items-center justify-center flex-shrink-0 shadow-md hover:bg-[#2f3037] hover:border-[#3a8ff7] transition-all cursor-pointer gemini-glow">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>

                    <div class="flex-1 h-12 bg-[#16243d] border border-[#2f3037] rounded-full flex items-center px-4 relative shadow-md gemini-glow">
                         <input type="text" id="cg-input" class="flex-1 bg-transparent text-white outline-none w-full text-sm" placeholder="Type..." autocomplete="off">
                         <button id="cg-send" class="hidden w-8 h-8 rounded-full bg-[#3a8ff7] text-white items-center justify-center absolute right-2 hover:bg-[#3a8ff7]/80 cursor-pointer">
                             <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                         </button>
                    </div>

                    <button id="cg-mic" class="w-12 h-12 rounded-full bg-[#16243d] border border-[#2f3037] text-[#3a8ff7] flex items-center justify-center flex-shrink-0 shadow-md hover:bg-[#2f3037] hover:border-[#3a8ff7] transition-all cursor-pointer gemini-glow">
                        <svg id="cg-mic-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                        <svg id="cg-mic-off" class="hidden text-red-500" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>

                    <button id="cg-end" class="h-12 bg-[#16243d] border border-[#2f3037] text-[#3a8ff7] font-semibold text-sm px-5 rounded-full flex items-center gap-2 flex-shrink-0 shadow-md hover:bg-[#2f3037] hover:border-[#3a8ff7] transition-all cursor-pointer gemini-glow">
                        <div class="flex items-center h-4">
                            <div class="cg-wave" style="animation-delay: 0s;"></div>
                            <div class="cg-wave" style="animation-delay: 0.2s;"></div>
                            <div class="cg-wave" style="animation-delay: 0.4s;"></div>
                            <div class="cg-wave" style="animation-delay: 0.6s;"></div>
                        </div>
                        End
                    </button>

                </div>

            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
