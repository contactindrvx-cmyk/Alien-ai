<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayesha AI Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cg-wave { width: 4px; background-color: #ef4444; border-radius: 4px; animation: cgwave 1s ease-in-out infinite; margin: 0 1.5px; }
        @keyframes cgwave { 0%, 100% { height: 6px; } 50% { height: 16px; } }

        .btn-collapse { width: 0 !important; padding: 0 !important; border-width: 0 !important; opacity: 0 !important; overflow: hidden !important; margin: 0 !important; pointer-events: none; }
        .btn-expand { width: 56px !important; opacity: 1 !important; pointer-events: auto; }
        .transition-layout { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .ai-text-container { font-size: 1.1rem; line-height: 1.8; text-align: right; font-family: sans-serif; direction: rtl; color: #e5e7eb; }
        .typing-cursor::after {
            content: '●'; color: #e5e7eb; margin-right: 4px; animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="h-screen flex bg-black text-white font-sans w-full overflow-hidden relative">
    
    <div id="top-toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-[#2f3037] text-gray-200 px-6 py-2.5 rounded-full text-sm font-medium z-50 transition-all duration-300 opacity-0 -translate-y-10 pointer-events-none flex items-center shadow-lg border border-[#3a8ff7]/30">
        <span id="toast-text">Notification</span>
    </div>

    <input type="file" id="hidden-file-input" class="absolute w-0 h-0 opacity-0" accept="image/*" style="pointer-events: none;">

    <div class="flex-1 flex flex-col h-full w-full">
        
        <header class="flex items-center justify-between p-4 bg-black z-40 relative">
            
            <div class="relative">
                <button id="profile-btn" class="w-10 h-10 rounded-full bg-gradient-to-br from-[#3a8ff7] to-purple-600 text-white font-bold flex items-center justify-center shadow-md hover:opacity-80 transition cursor-pointer">
                    R
                </button>
                <div id="profile-menu" class="hidden absolute top-12 left-0 w-64 bg-[#2f3037] rounded-xl shadow-2xl border border-gray-700 py-2 z-50 transition-all">
                    <div class="px-4 py-3 border-b border-gray-700 mb-1">
                        <p class="text-sm font-bold text-white">Ali Raza</p>
                        <p class="text-xs text-gray-400 mt-1">alirazasabir007@gmail.com</p>
                    </div>
                    <button class="w-full text-left px-4 py-2.5 text-sm text-white hover:bg-gray-700 flex items-center gap-2"><svg width="16" height="16" fill="none" stroke="#3a8ff7" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2ll3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg> Upgrade Premium</button>
                    <button class="w-full text-left px-4 py-2.5 text-sm text-white hover:bg-gray-700">Switch Account</button>
                    <button class="w-full text-left px-4 py-2.5 text-sm text-red-400 hover:bg-gray-700">Sign Out</button>
                </div>
            </div>

            <div class="relative">
                <button id="assistant-btn" class="flex items-center gap-2 bg-[#16243d] border border-[#3a8ff7]/40 px-4 py-2 rounded-full text-gray-200 font-medium hover:bg-[#2f3037] transition shadow-sm cursor-pointer">
                    <span id="current-assistant" class="text-sm">عائشہ</span>
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"></path></svg>
                </button>
                <div id="assistant-menu" class="hidden absolute top-12 right-0 w-48 bg-[#2f3037] rounded-xl shadow-2xl border border-gray-700 py-2 z-50 transition-all">
                    <button class="asst-option w-full text-right px-4 py-2.5 text-sm text-white hover:bg-gray-700 flex justify-end items-center gap-3">عائشہ <span class="w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_5px_#22c55e]"></span></button>
                    <button class="asst-option w-full text-right px-4 py-2.5 text-sm text-white hover:bg-gray-700 flex justify-end items-center gap-3">رضا <span class="w-2.5 h-2.5 rounded-full bg-blue-500"></span></button>
                    <button class="asst-option w-full text-right px-4 py-2.5 text-sm text-white hover:bg-gray-700 flex justify-end items-center gap-3">سارہ <span class="w-2.5 h-2.5 rounded-full bg-purple-500"></span></button>
                    <button class="asst-option w-full text-right px-4 py-2.5 text-sm text-white hover:bg-gray-700 flex justify-end items-center gap-3">ایلکس <span class="w-2.5 h-2.5 rounded-full bg-orange-500"></span></button>
                </div>
            </div>
        </header>

        <main class="flex-1 flex flex-col relative overflow-hidden bg-black">
            <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 relative z-10 pb-36" id="chat-box">
                <div id="image-preview-container" class="hidden absolute bottom-4 left-4 md:left-6 z-40">
                    <div class="relative inline-block">
                        <img id="preview-img" src="" class="h-16 w-16 object-cover rounded-xl border-2 border-[#3a8ff7] shadow-lg">
                        <button id="remove-img-btn" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md hover:bg-red-600 transition-colors z-50 cursor-pointer">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
                <div class="flex flex-col items-end mb-8 w-full pr-2">
                    <div class="ai-text-container text-gray-400 text-sm">اسسٹنٹ تیار ہے۔ آپ کا دن کیسا گزر رہا ہے؟</div>
                </div>
                <div id="thinking-indicator" class="hidden w-full flex justify-end px-2 pb-6"><span class="text-[#3a8ff7] animate-pulse font-medium text-sm">سوچ رہی ہے...</span></div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 h-40 bg-gradient-to-t from-black via-black/95 to-transparent pointer-events-none z-20"></div>

            <div class="px-4 md:px-6 pb-6 bg-transparent z-30 w-full max-w-4xl mx-auto absolute bottom-0 left-0 right-0">
                <div id="normal-mode-bar" class="flex items-center justify-between w-full h-14 transition-layout">
                    <button id="out-plus" class="btn-collapse transition-layout h-14 rounded-full bg-[#16243d] border border-[#2f3037] flex items-center justify-center text-gray-400 mr-2 flex-shrink-0 cursor-pointer">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <div id="main-pill" class="flex-1 h-14 bg-[#212121] border border-[#2f3037] rounded-full flex items-center transition-layout overflow-hidden shadow-lg relative">
                        <button id="in-plus" class="w-14 transition-layout h-full flex items-center justify-center text-gray-400 flex-shrink-0 cursor-pointer hover:text-white">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                        
                        <input type="text" id="user-input" class="flex-1 h-full bg-transparent px-3 text-white outline-none transition-layout text-right text-[1.05rem]" placeholder="...میسج ٹائپ کریں" autocomplete="off" dir="rtl">
                        
                        <button id="in-send" class="btn-collapse transition-layout h-full flex items-center justify-center text-white bg-white/10 rounded-full my-1 mx-1 flex-shrink-0 cursor-pointer pr-4 pl-3">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                        </button>
                        
                        <button id="in-mic" class="w-14 transition-layout h-full flex items-center justify-center text-gray-400 hover:text-white flex-shrink-0 cursor-pointer" onclick="if(window.AndroidBridge) window.AndroidBridge.toggleInlineMic()">
                            <svg id="icon-mic-normal" class="absolute transition-all" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                            <svg id="icon-mic-stop" class="hidden absolute text-white" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="3"/></svg>
                        </button>
                        
                        <button id="in-call" class="w-14 transition-layout h-full flex items-center justify-center text-gray-400 hover:text-white flex-shrink-0 cursor-pointer border-l border-[#2f3037]">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 7v10"></path><path d="M7 10v4"></path><path d="M22 10v4"></path><path d="M2 11v2"></path></svg>
                        </button>
                    </div>
                </div>

                <div id="call-mode-bar" class="hidden items-center justify-center w-full h-14 gap-4 transition-layout">
                    <div class="flex-1 h-14 bg-[#212121] border border-[#2f3037] rounded-full flex items-center px-5 relative shadow-lg">
                        <span id="call-status-text" class="text-gray-400 text-sm animate-pulse flex-1 text-center">سن رہی ہوں...</span>
                    </div>
                    
                    <button id="cg-end" class="h-14 bg-red-500/20 border border-red-500 text-red-500 font-bold text-sm px-6 rounded-full flex items-center gap-3 flex-shrink-0 shadow-lg hover:bg-red-500/30 transition-all cursor-pointer">
                        <div class="flex items-center h-4">
                            <div class="cg-wave" style="animation-delay: 0s;"></div>
                            <div class="cg-wave" style="animation-delay: 0.2s;"></div>
                            <div class="cg-wave" style="animation-delay: 0.4s;"></div>
                        </div>
                        End Call
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
