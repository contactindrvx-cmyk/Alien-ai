<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayesha AI Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-bubble { border-radius: 24px; padding: 14px 20px; max-width: 85%; width: fit-content; line-height: 1.6; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.15); animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ayesha-bubble { background-color: #16243d; border-bottom-left-radius: 4px; margin-top: 15px; }
        .user-bubble { background-color: #2f3037; margin-left: auto; color: #e0e0e0; border-bottom-right-radius: 4px; }
        .gemini-glow { box-shadow: 0 0 15px rgba(58, 143, 247, 0.1); transition: all 0.3s ease; }
        .gemini-glow:focus-within, .gemini-glow.active { box-shadow: 0 0 25px rgba(58, 143, 247, 0.3); border-color: #3a8ff7 !important; }
        
        /* عائشہ کے میسج کے اندر چھوٹا پلے بٹن */
        .inline-play-btn { display: inline-flex; align-items: center; justify-content: center; background: rgba(58,143,247,0.15); color: #3a8ff7; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; margin-top: 8px; transition: 0.2s; border: 1px solid #3a8ff7;}
        .inline-play-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="h-screen flex bg-black text-white font-sans w-full overflow-hidden relative">
    <input type="file" id="hidden-file-input" class="hidden" accept="image/*">
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden transition-opacity cursor-pointer"></div>

    <aside id="sidebar" class="fixed z-50 w-64 h-full border-r border-[#2f3037] p-4 flex flex-col bg-[#0a0a0a] transform -translate-x-full transition-transform duration-300 ease-in-out left-0 top-0 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-[#3a8ff7]">Select Assistant</h2>
        <div class="flex-1 space-y-4 overflow-y-auto" id="assistants-list">
            <button class="assistant-btn w-full text-left p-3 bg-[#16243d] border border-[#3a8ff7] rounded-xl flex items-center gap-3 transition" data-name="Ayesha AI">
                <span class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></span> 
                <span class="font-semibold">Ayesha AI</span>
            </button>
        </div>
        <div class="border-t border-[#2f3037] mt-2 pt-4 flex items-center gap-3 p-2">
            <div class="w-8 h-8 rounded-full bg-[#3a8ff7] flex items-center justify-center font-bold text-white shadow-md">R</div>
            <span class="font-medium text-sm">Ali Raza</span>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full w-full">
        <header class="flex items-center justify-between p-4 border-b border-[#2f3037] bg-[#0a0a0a] z-30">
            <button id="menu-btn" class="p-2 text-[#3a8ff7] hover:bg-[#2f3037] rounded-lg transition">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 id="header-title" class="text-lg font-bold text-white tracking-wide">Ayesha AI</h1>
            <div class="w-10"></div> 
        </header>

        <main class="flex-1 flex flex-col relative overflow-hidden">
            <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6" id="chat-box">
                <div id="thinking-indicator" class="hidden w-full mt-4">
                    <div class="chat-bubble ayesha-bubble border border-[#3a8ff7] flex items-center gap-3">
                        <svg class="animate-spin w-5 h-5 text-[#3a8ff7]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span id="indicator-text" class="animate-pulse text-[#3a8ff7] text-sm font-medium">Thinking...</span>
                    </div>
                </div>
            </div>

            <div class="p-4 md:px-20 pb-6 w-full relative bg-black">
                <div class="relative w-full flex items-center justify-center max-w-4xl mx-auto h-16">
                    <button id="plus-btn" class="absolute left-1 z-10 w-12 h-12 flex items-center justify-center text-[#3a8ff7] rounded-full transition-all duration-300 bg-transparent">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <div id="input-pill" class="flex-1 h-14 bg-[#16243d] border border-[#2f3037] gemini-glow rounded-full flex items-center transition-all duration-300 ml-0 pl-14 w-full relative">
                        <input type="text" id="user-input" class="flex-1 bg-transparent px-2 py-3 outline-none text-white text-base placeholder-gray-400 w-full" placeholder="Ask something..." autocomplete="off">
                        <button id="action-btn" class="p-3 text-[#3a8ff7] flex-shrink-0 mr-1 z-30 transition-colors hover:text-white">
                            <svg id="mic-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                            <svg id="stop-icon" class="hidden text-[#3a8ff7]" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="3"/></svg>
                            <svg id="send-icon" class="hidden text-white" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // 🔊 1. عائشہ کی آواز لانے کا فورس ویک سسٹم (کسی بھی طریقے سے)
            function forceWakeSpeaker() {
                try {
                    if('speechSynthesis' in window) {
                        let msg = new SpeechSynthesisUtterance('');
                        msg.volume = 0; // خاموش آواز تاکہ یوزر کو ڈسٹرب نہ کرے
                        window.speechSynthesis.speak(msg);
                    }
                } catch(e) {}
            }
            // یوزر جیسے ہی سکرین پر ٹچ کرے گا، سپیکر جاگ جائے گا
            document.body.addEventListener('touchstart', forceWakeSpeaker, {once:true});
            document.body.addEventListener('click', forceWakeSpeaker, {once:true});

            function speakAyesha(text) {
                try {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel(); // پرانی آواز روکو
                        
                        // ایموجیز ہٹائیں تاکہ صاف پڑھے
                        const cleanText = text.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');
                        let speech = new SpeechSynthesisUtterance(cleanText);
                        
                        // سمارٹ لینگویج چیک (اگر اردو/پنجابی لکھی ہے تو اردو بولے گی ورنہ فون کی زبان)
                        const isUrdu = /[\u0600-\u06FF]/.test(cleanText);
                        speech.lang = isUrdu ? 'ur-PK' : (navigator.language || 'en-US');
                        speech.rate = 0.95; 
                        
                        window.speechSynthesis.speak(speech);
                    }
                } catch(e) {
                    console.log("Speaker Error:", e);
                }
            }

            // 🌍 2. ملٹی لینگویج رئیل ٹائم ٹائپنگ (اردو، پنجابی، انگلش، سپینش)
            let recognition = null;
            let mediaRecorder = null;
            let audioChunks = [];
            let isRecording = false;

            if ('webkitSpeechRecognition' in window) {
                try {
                    recognition = new webkitSpeechRecognition();
                    recognition.continuous = false;
                    recognition.interimResults = true; // رئیل ٹائم ٹائپنگ آن
                    
                    // آٹو ڈیٹیکٹ زبان: یہ آپ کے فون کی بورڈ اور گوگل سیٹنگز سے خود سمجھے گا
                    recognition.lang = navigator.language;

                    recognition.onresult = function(event) {
                        let finalTranscript = '';
                        let interimTranscript = '';
                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            if (event.results[i].isFinal) { finalTranscript += event.results[i][0].transcript; } 
                            else { interimTranscript += event.results[i][0].transcript; }
                        }
                        input.value = finalTranscript || interimTranscript;
                        updateUI();
                    };

                    recognition.onend = function() {
                        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                            mediaRecorder.stop(); 
                        }
                    };
                } catch (e) {
                    console.log("Speech recognition failed to init.");
                }
            }

            const input = document.getElementById('user-input');
            const inputPill = document.getElementById('input-pill');
            const plusBtn = document.getElementById('plus-btn');
            const fileInput = document.getElementById('hidden-file-input');
            const actionBtn = document.getElementById('action-btn');
            const micIcon = document.getElementById('mic-icon');
            const stopIcon = document.getElementById('stop-icon');
            const sendIcon = document.getElementById('send-icon');
            const chatBox = document.getElementById('chat-box');
            const thinkingIndicator = document.getElementById('thinking-indicator');
            const indicatorText = document.getElementById('indicator-text');

            function showThinking(text) {
                indicatorText.innerText = text;
                thinkingIndicator.classList.remove('hidden');
                thinkingIndicator.classList.add('block');
                chatBox.appendChild(thinkingIndicator);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            function hideThinking() {
                thinkingIndicator.classList.add('hidden');
                thinkingIndicator.classList.remove('block');
            }

            function updateUI() {
                const hasText = input.value.trim().length > 0;
                const isActive = (document.activeElement === input) || hasText || isRecording;
                
                if (isActive) {
                    plusBtn.classList.add('bg-[#2f3037]', 'border-[#3a8ff7]', 'border');
                    inputPill.style.marginLeft = "64px"; inputPill.style.paddingLeft = "10px"; inputPill.classList.add('active');
                } else {
                    plusBtn.classList.remove('bg-[#2f3037]', 'border-[#3a8ff7]', 'border');
                    inputPill.style.marginLeft = "0px"; inputPill.style.paddingLeft = "56px"; inputPill.classList.remove('active');
                }
                
                if (hasText) {
                    micIcon.classList.add('hidden'); stopIcon.classList.add('hidden'); sendIcon.classList.remove('hidden');
                } else if (isRecording) {
                    micIcon.classList.add('hidden'); sendIcon.classList.add('hidden'); stopIcon.classList.remove('hidden');
                } else {
                    stopIcon.classList.add('hidden'); sendIcon.classList.add('hidden'); micIcon.classList.remove('hidden');
                }
            }

            input.addEventListener('input', updateUI);
            input.addEventListener('focus', updateUI);
            input.addEventListener('blur', updateUI);

            plusBtn.onclick = () => fileInput.click(); 

            const fileToBase64 = file => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });

            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        addMessage("Image attached...", 'user', event.target.result);
                    };
                    reader.readAsDataURL(file);
                    sendToHuggingFace("اس تصویر کو دیکھو۔", file, null); 
                }
            };

            const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebar-overlay'), menuBtn = document.getElementById('menu-btn');
            function toggleMenu() { sidebar.classList.toggle('-translate-x-full'); overlay.classList.toggle('hidden'); }
            menuBtn.onclick = toggleMenu; overlay.onclick = toggleMenu;

            // میسج دکھانا (محفوظ اور کلین)
            function addMessage(text, sender, imgSrc = null) {
                const msgDiv = document.createElement('div');
                let imgHtml = imgSrc ? `<img src="${imgSrc}" class="w-full max-w-[220px] rounded-lg mb-3 border-2 border-[#3a8ff7] shadow-lg">` : '';

                if (sender === 'user') {
                    msgDiv.className = 'chat-bubble user-bubble border border-[#3a8ff7]';
                    msgDiv.innerHTML = `${imgHtml}<p>${text}</p>`;
                } else {
                    msgDiv.className = 'relative group w-full mt-4';
                    
                    // ایک چھوٹا سا پلے بٹن ببل کے اندر دیا گیا ہے اگر آٹو پلے مس ہو جائے
                    const safeText = text.replace(/['"]/g, "");
                    msgDiv.innerHTML = `
                        <div class="chat-bubble ayesha-bubble border border-[#3a8ff7] z-10 relative">
                            ${imgHtml}<p style="white-space: pre-wrap;">${text}</p>
                            <button class="inline-play-btn" onclick="speakAyesha('${safeText}')" title="Play Audio">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            </button>
                        </div>
                    `;
                }
                
                chatBox.insertBefore(msgDiv, thinkingIndicator);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            async function sendToHuggingFace(text, file, audioBlob) {
                if(file) { showThinking("تصویر دیکھ رہی ہے..."); } 
                else if(audioBlob) { showThinking("آواز سن رہی ہے..."); }
                else { showThinking("ٹائپ کر رہی ہے..."); }

                const API_URL = "https://aigrowthbox-ayesha-ai.hf.space/chat"; 
                let payload = {
                    message: text || "",
                    email: "alirazasabir007@gmail.com", 
                    local_time: new Date().toLocaleTimeString()
                };

                try {
                    if (file) payload.image = await fileToBase64(file);
                    if (audioBlob) payload.audio = await fileToBase64(audioBlob);

                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    hideThinking();
                    
                    const replyText = data.response || "میں سمجھ نہیں سکی۔";
                    addMessage(replyText, 'assistant');
                    
                    // 🔊 عائشہ خودکار بولے گی
                    speakAyesha(replyText);
                    
                } catch (err) {
                    hideThinking();
                    addMessage("سرور آف لائن ہے۔ انٹرنیٹ چیک کریں۔", 'assistant');
                }
            }

            async function startRecordingSafely() {
                try {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        alert("آپ کا فون مائیک سپورٹ نہیں کر رہا۔ براہ کرم ٹائپ کریں۔");
                        return;
                    }

                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    
                    mediaRecorder.onstop = () => {
                        isRecording = false;
                        hideThinking();
                        input.placeholder = "Ask something...";
                        
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const text = input.value.trim();
                        
                        if (text.length > 0 || audioChunks.length > 0) {
                            addMessage(text || "🎤 Voice Message", 'user');
                            input.value = '';
                            updateUI();
                            // اصلی آواز اور ٹیکسٹ دونوں جا رہے ہیں
                            sendToHuggingFace(text, null, audioBlob);
                        }
                        stream.getTracks().forEach(track => track.stop());
                    };

                    input.value = ''; 
                    if (recognition) { recognition.start(); }
                    mediaRecorder.start(); 
                    
                    isRecording = true;
                    updateUI();
                    input.placeholder = "سن رہی ہوں...";
                    showThinking("عائشہ سن رہی ہے...");
                    
                } catch (err) {
                    alert("مائیکروفون کی اجازت درکار ہے!");
                }
            }

            function stopRecordingSafely() {
                try {
                    if (recognition) { recognition.stop(); }
                    else if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
                } catch(e) {}
            }

            actionBtn.onclick = (e) => {
                e.preventDefault();
                if (input.value.trim().length > 0) {
                    const text = input.value.trim();
                    addMessage(text, 'user');
                    input.value = ''; updateUI(); 
                    sendToHuggingFace(text, null, null); 
                } else {
                    if (isRecording) { stopRecordingSafely(); } else { startRecordingSafely(); }
                }
            };

            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && input.value.trim().length > 0) {
                    const text = input.value.trim();
                    addMessage(text, 'user');
