<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayesha AI Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .wave-bar { width: 3px; height: 12px; background-color: #3a8ff7; border-radius: 4px; animation: wave 1.2s ease-in-out infinite; margin: 0 1.5px; }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; } .wave-bar:nth-child(3) { animation-delay: 0.4s; } .wave-bar:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { height: 8px; } 50% { height: 22px; } }
        
        .pop-out-btn {
            position: absolute; width: 52px; height: 52px; border-radius: 50%;
            background-color: #16243d; border: 1px solid #2f3037;
            display: flex; align-items: center; justify-content: center; color: #3a8ff7;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: scale(0.5); pointer-events: none; z-index: 40;
        }
        .pop-out-btn.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        .gemini-glow { box-shadow: 0 0 15px rgba(58, 143, 247, 0.15); border-color: #3a8ff7 !important; }
        .hide-call-btn { width: 0 !important; opacity: 0 !important; padding: 0 !important; border: none !important; overflow: hidden; margin: 0 !important;}
    </style>
</head>
<body class="h-screen flex bg-black text-white font-sans w-full overflow-hidden relative">
    
    <div id="top-toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-[#2f3037] text-gray-200 px-6 py-2.5 rounded-full text-sm font-medium z-50 transition-all duration-300 opacity-0 -translate-y-10 pointer-events-none flex items-center gap-3 shadow-lg border border-[#3a8ff7]/30">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3a8ff7" stroke-width="2"><path d="M12 2v20"></path><path d="M17 7v10"></path><path d="M7 10v4"></path><path d="M22 10v4"></path><path d="M2 11v2"></path></svg>
        <span id="toast-text">Voice chat ended</span>
    </div>

    <input type="file" id="hidden-file-input" class="hidden" accept="image/*">
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden transition-opacity cursor-pointer"></div>

    <aside id="sidebar" class="fixed z-50 w-64 h-full border-r border-[#2f3037] flex flex-col bg-[#0a0a0a] transform -translate-x-full transition-transform duration-300 ease-in-out left-0 top-0 shadow-2xl">
        <div class="p-4 flex-1 flex flex-col overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6 mt-4 text-center text-[#3a8ff7]">Select Assistant</h2>
            <div class="space-y-4" id="assistants-list">
                <button class="assistant-btn w-full text-left p-3 bg-[#16243d] border border-[#3a8ff7] rounded-xl flex items-center gap-3 transition">
                    <span class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></span> 
                    <span class="font-semibold">Ayesha AI</span>
                </button>
            </div>
        </div>
        <div class="p-4 border-t border-[#2f3037] bg-[#0a0a0a]">
            <button class="w-full mb-4 py-2.5 bg-gradient-to-r from-[#3a8ff7] to-purple-600 rounded-xl font-bold text-white transition-transform active:scale-95 flex items-center justify-center gap-2">Upgrade Premium</button>
            <div class="flex items-center gap-3 mt-2">
                <div class="w-8 h-8 rounded-full bg-[#3a8ff7] flex items-center justify-center font-bold text-white shadow-md">R</div>
                <span class="font-medium text-sm text-gray-200">Ali Raza</span>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full w-full">
        <header class="flex items-center justify-between p-4 border-b border-[#2f3037] bg-[#0a0a0a] z-30">
            <button id="menu-btn" class="p-2 text-[#3a8ff7] hover:bg-[#2f3037] rounded-lg transition">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 class="text-lg font-bold text-white tracking-wide">Ayesha AI</h1>
            <div class="w-10"></div> 
        </header>

        <main class="flex-1 flex flex-col relative overflow-hidden bg-black">
            <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6" id="chat-box">
                <div id="image-preview-container" class="hidden absolute bottom-20 left-4 md:left-6 z-40">
                    <div class="relative inline-block">
                        <img id="preview-img" src="" class="h-16 w-16 object-cover rounded-xl border-2 border-[#3a8ff7] shadow-lg">
                        <button id="remove-img-btn" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md hover:bg-red-600 transition-colors z-50">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
                <div id="thinking-indicator" class="hidden w-full flex justify-start px-2"><span class="text-[#3a8ff7] animate-pulse font-medium">سوچ رہی ہے...</span></div>
            </div>

            <div class="px-4 md:px-6 pb-6 bg-black z-30">
                <div id="chat-wrapper" class="flex items-center w-full max-w-4xl mx-auto h-14 gap-0 transition-all duration-500">
                    <button id="btn-plus" class="w-14 h-14 bg-[#16243d] border border-[#2f3037] flex-shrink-0 flex justify-center items-center text-[#3a8ff7] rounded-l-full transition-all duration-500 z-10 active:scale-95 border-r-0">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>

                    <div id="center-area" class="flex-1 h-14 bg-[#16243d] border-y border-[#2f3037] flex items-center transition-all duration-500 overflow-hidden relative">
                        <input type="text" id="user-input" class="absolute inset-0 w-full h-full bg-transparent px-3 text-white outline-none transition-all duration-300" placeholder="Ask something..." autocomplete="off">
                        <button id="send-btn" class="absolute right-2 w-10 h-10 flex items-center justify-center transition-all duration-300 transform scale-0 opacity-0 pointer-events-none text-[#3a8ff7] hover:text-white"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></button>

                        <div id="call-inner-ui" class="absolute inset-0 w-full h-full flex items-center justify-between px-3 transform translate-y-14 opacity-0 transition-all duration-500 pointer-events-none">
                            <div class="flex items-center gap-3">
                                <div class="flex items-center h-6 justify-center"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div>
                                <span class="text-[#3a8ff7] text-sm font-medium">Listening...</span>
                            </div>
                            <button id="btn-end" class="h-9 px-4 rounded-full bg-red-500/20 text-red-500 font-bold text-sm flex items-center gap-1.5 border border-red-500/30">End</button>
                        </div>
                    </div>

                    <button id="btn-mic" class="w-14 h-14 bg-[#16243d] border-y border-[#2f3037] flex-shrink-0 flex justify-center items-center text-[#3a8ff7] transition-all duration-500 z-10 active:scale-95 relative">
                        <svg id="icon-mic-normal" class="absolute transition-all duration-300" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                        <svg id="icon-mic-stop" class="hidden absolute text-white animate-pulse" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="3"/></svg>
                    </button>

                    <button id="btn-call" class="w-14 h-14 bg-[#16243d] border border-[#2f3037] border-l-0 flex-shrink-0 flex justify-center items-center text-[#3a8ff7] rounded-r-full transition-all duration-500 active:scale-95">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"></path><path d="M17 7v10"></path><path d="M7 10v4"></path><path d="M22 10v4"></path><path d="M2 11v2"></path></svg>
                    </button>

                    <button id="call-plus-btn" class="pop-out-btn shadow-xl bg-[#16243d] border-[#2f3037]"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                    <button id="mute-call-btn" class="pop-out-btn shadow-xl bg-[#16243d] border-[#2f3037]" style="left: 64px;">
                        <svg id="icon-call-unmuted" class="absolute transition-all" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                        <svg id="icon-call-muted" class="hidden absolute text-red-500 transition-all" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        <svg id="icon-call-send" class="hidden absolute text-[#3a8ff7] transition-all" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
                                                                                                                                                                                                                                  </html>
